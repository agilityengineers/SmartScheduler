name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: smartscheduler_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Type check. Non-blocking for now: the repo has a set of pre-existing type
      # errors (schema drift in memStorage and standalone test scripts) that are
      # tracked for burn-down. This step surfaces regressions without failing CI.
      - name: Type check (non-blocking)
        run: npm run check
        continue-on-error: true

      # Hard gate: the client + server bundles must build.
      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Exercise the real Postgres storage path (not in-memory) so the tests
      # cover what production runs.
      - name: Set up test environment
        run: |
          cp .env.example .env || echo "No .env.example found"
          echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/smartscheduler_test" >> .env
          echo "SESSION_SECRET=test-secret-key-for-ci" >> .env
          echo "NODE_ENV=test" >> .env
          echo "USE_POSTGRES=true" >> .env

      - name: Push database schema
        run: npm run db:push

      # playwright.config.ts starts the app via its webServer setting.
      - name: Run Playwright tests
        run: npm test
        env:
          CI: 'true'
          HOST: localhost

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Comment PR with test results
        uses: daun/playwright-report-comment@v3
        if: always() && github.event_name == 'pull_request'
        with:
          report-path: playwright-report/index.html
