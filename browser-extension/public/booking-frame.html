<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartScheduler Booking</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="booking-iframe" src="" allow="clipboard-write"></iframe>
  <script>
    // Receive booking URL from parent via postMessage
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'SET_BOOKING_URL') {
        document.getElementById('booking-iframe').src = event.data.url;
      }
    });
  </script>
</body>
</html>
